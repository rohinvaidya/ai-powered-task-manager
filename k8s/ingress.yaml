# Ingress — routes external traffic to the app service
# Requires an ingress controller (e.g. nginx-ingress) installed in the cluster
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
  namespace: taskmanager
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod  # remove if not using cert-manager
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - taskmanager.yourdomain.com
      secretName: taskmanager-tls
  rules:
    - host: taskmanager.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskmanager-svc
                port:
                  number: 80
